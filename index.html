<!DOCTYPE html>
<html>
<head>
    <title>Tomarigi</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<body>
    <!-- ヒーロー画像 -->
    <div class="hero">
    <img src="images/hero.png" alt="Tomarigi">

    <div class="hero-text">
   <h1>Tomarigi</h1>
   <h2>また歩き出すための止まり木</h2>
    </div>
    </div>
    <!-- ここまでタイトル -->
    <!-- コンセプト説明看板部分 -->
    <div class="about-section">
    <a href="#" class="wood-button">とまりぎとは</a>
    <!-- サブタイトル的な -->
    <p>
        目的地ではなく、また歩き出すための場所。<br>
        ちょっと羽を休めたいとき、 地図を眺める時間が欲しいとき、<br>
        そんなときに立ち寄る場所。<br>
    </p>
    </div>
<!--ひとやすみ席の紹介-->
<div class="menu">
<div class="menu-card">
<div class="menu-text">
    <a href="#" class="wood-button">ひとやすみの木</a>
    <p>
    忙しい毎日に、小さな寄り道。
    </p>
</div>
<div class="menu-image">
    <img src="images/hitoyasumi.png" alt="ひとりぶんのお席">
</div>
</div>

<!--やくそくの木の紹介-->
<div class="menu-card">
<div class="menu-text">
<a href="#" class="wood-button">やくそくの木</a>
<p>
お待ち合わせでも、偶然でも。
</p>
</div>
<div class="menu-image">
    <img src="images/yakusoku.png" alt="ふたりぶんのお席">
</div>
</div>

<!--おこもりの木の紹介-->
<div class="menu-card">
<div class="menu-text">
<a href="#" class="wood-button">おこもりの木</a>
<p>
好きなことをやったっていい。<br>
何もしなくたっていい。
</p>
</div>
<div class="menu-image">
    <img src="images/okomori.png" alt="ゆっくり過ごすためのお席">
</div>
</div>

<div class="drink-title">
   <a href="#" class="wood-button">おのみもの</a>
</div>

<div class="drink-menu-card">
<div class="menu-text">
<a href="#" class="wood-button">いつものブレンド</a>
<p>
いつものって安心。
</p>
</div>
<div class="menu-image">
    <img src="images/brend-coffee.png" alt="ブレンドコーヒー">
</div>
</div>
</div>


<script src="script.js"></script>
